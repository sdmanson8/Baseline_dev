name: Feature request
description: Suggest a new tweak, region, GUI improvement, or quality-of-life addition.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. The more concrete the use case (and
        the more it ties back to a Windows configuration goal Baseline can
        actually own), the easier it is to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or workflow gap this feature would address.
      placeholder: I want to ... but today Baseline doesn't let me ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch how the feature would work. UI mockups, JSON snippets, or registry keys are all welcome.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which Baseline surface does this touch?
      multiple: true
      options:
        - GUI (Settings, dialogs, panels)
        - Tweak / region (new toggle or bulk action)
        - Manifest / preset
        - Remote / orchestration
        - Logging / Support bundle
        - Documentation
        - Other (explain below)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, scripts, or GPO settings that already do this — and why they're not enough.
  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to upstream docs (Microsoft Learn, ADMX descriptions), winutil/Winhance issues, CVEs, etc.
  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions and didn't find an open request for this.
          required: true
        - label: This is a Baseline-scoped request (Windows tweak, manifest, GUI, support tooling) — not a wider Windows-itself feature.
          required: true
