name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\Tools\Test-SmokeTest.ps1

      - name: Run manifest validation
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\Tools\Validate-ManifestData.ps1
