name: Integration

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Test category to run (All, Registry, Services, Packages, GroupPolicy, GameMode)'
        required: false
        default: 'All'
      dry_run:
        description: 'Run in dry-run mode (skips destructive package operations)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  server-2022:
    name: Windows Server 2022 (self-hosted)
    runs-on: [self-hosted,server-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration suite (server SKU subset)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $dryRun = if ('${{ inputs.dry_run }}' -eq 'true') { '-DryRun' } else { '' }
          $category = '${{ inputs.category }}'
          if ([string]::IsNullOrWhiteSpace($category)) { $category = 'All' }
          # Server SKUs in CI cannot create system restore points.
          & .\Tests\Integration\IntegrationTest.ps1 -Category $category -SkipRestorePoint $dryRun

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-server-2022
          path: |
            Tests/Integration/**/*.json
            Tests/Integration/**/*.log
          if-no-files-found: ignore

  win10-22h2:
    name: Windows 10 22H2 Desktop (self-hosted)
    runs-on: [self-hosted, windows, desktop, win10-22h2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration suite (desktop SKU)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $dryRun = if ('${{ inputs.dry_run }}' -eq 'true') { '-DryRun' } else { '' }
          $category = '${{ inputs.category }}'
          if ([string]::IsNullOrWhiteSpace($category)) { $category = 'All' }
          & .\Tests\Integration\IntegrationTest.ps1 -Category $category $dryRun

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-win10-22h2
          path: |
            Tests/Integration/**/*.json
            Tests/Integration/**/*.log
          if-no-files-found: ignore

  win11-23h2:
    name: Windows 11 23H2 Desktop (self-hosted)
    runs-on: [self-hosted, windows, desktop, win11-23h2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration suite (desktop SKU)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $dryRun = if ('${{ inputs.dry_run }}' -eq 'true') { '-DryRun' } else { '' }
          $category = '${{ inputs.category }}'
          if ([string]::IsNullOrWhiteSpace($category)) { $category = 'All' }
          & .\Tests\Integration\IntegrationTest.ps1 -Category $category $dryRun

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-report-win11-23h2
          path: |
            Tests/Integration/**/*.json
            Tests/Integration/**/*.log
          if-no-files-found: ignore
